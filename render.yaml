services:
  - type: web
    name: saferide-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: SAFERIDE_ALLOWED_ORIGINS
        sync: false
      - key: SAFERIDE_ADMIN_TOKEN
        sync: false
      - key: SAFERIDE_APP_NAME
        value: SafeRide API
      - key: SAFERIDE_USE_REAL_NAC
        value: "off"
      - key: PYTHON_VERSION
        value: "3.12"

  - type: web
    name: saferide-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
